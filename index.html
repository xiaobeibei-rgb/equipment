<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>器材管理系统</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; background: #f5f5f3; color: #1a1a1a; min-height: 100vh; }

  .header { background: #fff; border-bottom: 1px solid #e5e5e3; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 56px; position: sticky; top: 0; z-index: 100; }
  .header-title { font-size: 16px; font-weight: 600; letter-spacing: -0.3px; }
  .header-sub { font-size: 12px; color: #888; margin-top: 2px; }
  .sync-btn { padding: 6px 14px; border-radius: 8px; border: 1px solid #e5e5e3; background: #fff; font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 6px; color: #555; transition: all .15s; }
  .sync-btn:hover { background: #f5f5f3; }
  .sync-btn.syncing { color: #2563eb; border-color: #2563eb; }

  .nav { background: #fff; border-bottom: 1px solid #e5e5e3; padding: 0 24px; display: flex; gap: 4px; }
  .nav-btn { padding: 12px 16px; border: none; background: transparent; font-size: 13px; color: #888; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all .15s; font-weight: 500; }
  .nav-btn.active { color: #1a1a1a; border-bottom-color: #1a1a1a; }
  .nav-btn:hover:not(.active) { color: #555; }

  .content { max-width: 960px; margin: 0 auto; padding: 24px 24px; }

  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
  .stat { background: #fff; border-radius: 12px; padding: 16px; border: 1px solid #e5e5e3; }
  .stat-label { font-size: 11px; color: #888; margin-bottom: 6px; text-transform: uppercase; letter-spacing: .5px; }
  .stat-val { font-size: 28px; font-weight: 600; line-height: 1; }
  .stat-val.green { color: #16a34a; }
  .stat-val.amber { color: #d97706; }
  .stat-val.red { color: #dc2626; }

  .toolbar { display: flex; gap: 10px; margin-bottom: 16px; align-items: center; }
  .search { flex: 1; padding: 9px 14px; border: 1px solid #e5e5e3; border-radius: 8px; font-size: 13px; background: #fff; outline: none; transition: border .15s; }
  .search:focus { border-color: #aaa; }
  .pills { display: flex; gap: 6px; }
  .pill { padding: 5px 12px; border-radius: 20px; font-size: 12px; border: 1px solid #e5e5e3; cursor: pointer; background: #fff; color: #666; transition: all .15s; font-weight: 500; }
  .pill.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
  .btn { padding: 8px 16px; border-radius: 8px; border: 1px solid #e5e5e3; background: #fff; font-size: 13px; cursor: pointer; font-weight: 500; transition: all .15s; color: #1a1a1a; white-space: nowrap; }
  .btn:hover { background: #f5f5f3; }
  .btn-primary { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
  .btn-primary:hover { background: #333; }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn-danger { border-color: #fca5a5; color: #dc2626; }
  .btn-danger:hover { background: #fef2f2; }

  table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 12px; overflow: hidden; border: 1px solid #e5e5e3; font-size: 13px; }
  th { text-align: left; padding: 10px 14px; color: #888; font-weight: 500; font-size: 11px; text-transform: uppercase; letter-spacing: .5px; border-bottom: 1px solid #e5e5e3; background: #fafafa; }
  td { padding: 12px 14px; border-bottom: 1px solid #f0f0ee; vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #fafafa; }
  .name-link { color: #1a1a1a; text-decoration: none; font-weight: 500; cursor: pointer; border: none; background: none; font-size: 13px; text-align: left; }
  .name-link:hover { text-decoration: underline; }

  .badge { display: inline-block; font-size: 11px; padding: 3px 9px; border-radius: 20px; font-weight: 600; }
  .badge-in { background: #dcfce7; color: #15803d; }
  .badge-out { background: #fef3c7; color: #b45309; }
  .badge-repair { background: #fee2e2; color: #b91c1c; }
  .badge-returned { background: #e0e7ff; color: #4338ca; }

  .thumb { width: 40px; height: 40px; border-radius: 8px; object-fit: cover; border: 1px solid #e5e5e3; cursor: pointer; }
  .thumb-empty { width: 40px; height: 40px; border-radius: 8px; background: #f5f5f3; border: 1px dashed #d5d5d3; display: flex; align-items: center; justify-content: center; cursor: pointer; }
  .thumb-empty svg { width: 16px; height: 16px; color: #bbb; }

  /* Modal */
  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 200; align-items: flex-start; justify-content: center; padding-top: 48px; padding-bottom: 48px; overflow-y: auto; }
  .modal-bg.open { display: flex; }
  .modal { background: #fff; border-radius: 16px; width: 100%; max-width: 540px; overflow: hidden; }
  .modal-header { padding: 18px 20px; border-bottom: 1px solid #e5e5e3; display: flex; align-items: center; justify-content: space-between; }
  .modal-title { font-size: 15px; font-weight: 600; }
  .modal-body { padding: 20px; }
  .close-btn { width: 28px; height: 28px; border-radius: 50%; border: none; background: #f5f5f3; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; color: #666; }
  .close-btn:hover { background: #e5e5e3; }

  .img-upload { width: 100%; height: 200px; border-radius: 10px; border: 2px dashed #e5e5e3; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; cursor: pointer; position: relative; overflow: hidden; background: #fafafa; transition: border .15s; margin-bottom: 18px; }
  .img-upload:hover { border-color: #aaa; }
  .img-upload img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  .img-upload-hint { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,.5); color: #fff; font-size: 12px; text-align: center; padding: 6px; }
  .img-upload-label { font-size: 13px; color: #888; }
  .img-upload-sub { font-size: 11px; color: #bbb; }

  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .detail-item { background: #f9f9f7; border-radius: 8px; padding: 10px 12px; }
  .detail-item-label { font-size: 11px; color: #888; margin-bottom: 3px; }
  .detail-item-val { font-size: 13px; font-weight: 600; }

  .desc-area { background: #f9f9f7; border-radius: 8px; padding: 12px; font-size: 13px; line-height: 1.7; color: #333; white-space: pre-wrap; min-height: 60px; }
  .section-label { font-size: 11px; color: #888; font-weight: 500; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 12px; color: #666; margin-bottom: 5px; font-weight: 500; }
  .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 9px 12px; border: 1px solid #e5e5e3; border-radius: 8px; font-size: 13px; background: #fff; outline: none; transition: border .15s; font-family: inherit; }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: #aaa; }
  .form-group textarea { resize: vertical; min-height: 80px; }
  .form-actions { display: flex; gap: 8px; margin-top: 18px; }

  /* Calendar */
  .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .cal-month { font-size: 16px; font-weight: 600; }
  .cal-grid-names { display: grid; grid-template-columns: repeat(7,1fr); gap: 4px; margin-bottom: 6px; }
  .cal-day-name { text-align: center; font-size: 11px; color: #888; padding: 4px; font-weight: 500; }
  .cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 4px; }
  .cal-day { background: #fff; border-radius: 8px; border: 1px solid #e5e5e3; min-height: 72px; padding: 6px; cursor: pointer; transition: all .15s; }
  .cal-day:hover { border-color: #aaa; }
  .cal-day.empty { background: transparent; border-color: transparent; cursor: default; }
  .cal-day.today { border-color: #1a1a1a; background: #1a1a1a; color: #fff; }
  .cal-day.has-booking { border-color: #f59e0b; }
  .cal-day-num { font-size: 12px; font-weight: 600; margin-bottom: 4px; }
  .cal-dot { font-size: 10px; color: #d97706; background: #fef3c7; border-radius: 4px; padding: 1px 4px; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cal-today-num { color: #fff; }
  .cal-detail { margin-top: 20px; }

  /* Borrow cards */
  .borrow-card { background: #fff; border-radius: 12px; border: 1px solid #e5e5e3; padding: 14px 16px; margin-bottom: 10px; }
  .borrow-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .borrow-name { font-weight: 600; font-size: 14px; }
  .borrow-meta { font-size: 12px; color: #888; margin-bottom: 6px; }
  .borrow-items { font-size: 12px; color: #555; }

  /* Return list */
  .return-card { background: #fff; border-radius: 12px; border: 1px solid #e5e5e3; padding: 14px 16px; margin-bottom: 10px; }
  .return-card.overdue { border-color: #fca5a5; background: #fff; }

  /* Toast */
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1a1a1a; color: #fff; padding: 10px 20px; border-radius: 8px; font-size: 13px; z-index: 999; opacity: 0; transition: opacity .2s; pointer-events: none; }
  .toast.show { opacity: 1; }

  /* Loading */
  .loading { text-align: center; padding: 48px; color: #888; font-size: 13px; }
  .spinner { width: 24px; height: 24px; border: 2px solid #e5e5e3; border-top-color: #1a1a1a; border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .empty-state { text-align: center; padding: 48px 24px; color: #888; }
  .empty-state-title { font-size: 15px; font-weight: 500; margin-bottom: 6px; color: #555; }

  .section { display: none; }
  .section.active { display: block; }

  @media (max-width: 600px) {
    .stats { grid-template-columns: repeat(2, 1fr); }
    .form-row { grid-template-columns: 1fr; }
    .detail-grid { grid-template-columns: 1fr; }
    .content { padding: 16px; }
    .toolbar { flex-wrap: wrap; }
  }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">器材管理系统</div>
    <div class="header-sub" id="sync-status">正在连接 Google Sheets...</div>
  </div>
  <button class="sync-btn" id="sync-btn" onclick="loadAll()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
    同步数据
  </button>
</div>

<div class="nav">
  <button class="nav-btn active" onclick="showSection('inventory', this)">器材列表</button>
  <button class="nav-btn" onclick="showSection('borrow', this)">借用申请</button>
  <button class="nav-btn" onclick="showSection('calendar', this)">日历视图</button>
  <button class="nav-btn" onclick="showSection('return', this)">归还入库</button>
</div>

<div class="content">

  <!-- 器材列表 -->
  <div id="inventory" class="section active">
    <div class="stats">
      <div class="stat"><div class="stat-label">总器材</div><div class="stat-val" id="s-total">—</div></div>
      <div class="stat"><div class="stat-label">在库</div><div class="stat-val green" id="s-in">—</div></div>
      <div class="stat"><div class="stat-label">借出中</div><div class="stat-val amber" id="s-out">—</div></div>
      <div class="stat"><div class="stat-label">维修中</div><div class="stat-val red" id="s-repair">—</div></div>
    </div>
    <div class="toolbar">
      <input class="search" id="search" placeholder="搜索器材名称或编号..." oninput="renderTable()">
      <div class="pills">
        <button class="pill active" onclick="setFilter('all',this)">全部</button>
        <button class="pill" onclick="setFilter('在库',this)">在库</button>
        <button class="pill" onclick="setFilter('借出',this)">借出中</button>
        <button class="pill" onclick="setFilter('维修',this)">维修中</button>
      </div>
      <button class="btn btn-primary" onclick="openAddModal()">+ 新增器材</button>
    </div>
    <div id="table-wrap">
      <div class="loading"><div class="spinner"></div>正在从 Google Sheets 加载数据...</div>
    </div>
  </div>

  <!-- 借用申请 -->
  <div id="borrow" class="section">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
      <div>
        <div style="background:#fff;border-radius:12px;border:1px solid #e5e5e3;padding:20px;margin-bottom:16px">
          <div style="font-weight:600;font-size:15px;margin-bottom:4px">新建借用申请</div>
          <div style="font-size:12px;color:#888;margin-bottom:16px">提交后器材状态自动更新到 Google Sheets</div>
          <div class="form-row">
            <div class="form-group"><label>借用人姓名</label><input id="b-name" placeholder="姓名"></div>
            <div class="form-group"><label>联系方式</label><input id="b-contact" placeholder="邮箱或电话"></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label>借出日期</label><input type="date" id="b-out"></div>
            <div class="form-group"><label>预计归还日期</label><input type="date" id="b-return"></div>
          </div>
          <div class="form-group">
            <label>选择器材（仅显示在库）</label>
            <div id="eq-checklist" style="margin-top:6px;display:flex;flex-direction:column;gap:6px;max-height:180px;overflow-y:auto"></div>
          </div>
          <div class="form-group"><label>用途说明</label><textarea id="b-note" placeholder="活动名称、使用地点等"></textarea></div>
          <button class="btn btn-primary" style="width:100%" onclick="submitBorrow()">提交申请</button>
        </div>
      </div>
      <div>
        <div style="font-weight:600;font-size:15px;margin-bottom:12px">借用记录</div>
        <div id="borrow-list"><div class="loading"><div class="spinner"></div>加载中...</div></div>
      </div>
    </div>
  </div>

  <!-- 日历 -->
  <div id="calendar" class="section">
    <div style="background:#fff;border-radius:12px;border:1px solid #e5e5e3;padding:20px">
      <div class="cal-header">
        <button class="btn btn-sm" onclick="changeMonth(-1)">← 上月</button>
        <span class="cal-month" id="cal-title"></span>
        <button class="btn btn-sm" onclick="changeMonth(1)">下月 →</button>
      </div>
      <div class="cal-grid-names" id="cal-names"></div>
      <div class="cal-grid" id="cal-body"></div>
      <div class="cal-detail" id="cal-detail"></div>
    </div>
  </div>

  <!-- 归还 -->
  <div id="return" class="section">
    <div style="font-weight:600;font-size:15px;margin-bottom:16px">待归还器材</div>
    <div id="return-list"><div class="loading"><div class="spinner"></div>加载中...</div></div>
  </div>

</div>

<!-- 详情/编辑 Modal -->
<div class="modal-bg" id="modal-bg" onclick="handleBgClick(event)">
  <div class="modal" id="modal-box"></div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbyDdQDYQ3E2rIfpspv9tHflZO-vhElvUbkKaHdpfx-AG2aikkJ3_Tfrc56aiU2x_bqo/exec';

let equipment = [];
let borrows = [];
let currentFilter = 'all';
let calYear = new Date().getFullYear();
let calMonth = new Date().getMonth();

// ── API ──────────────────────────────────────────
async function apiFetch(params) {
  const url = API + '?' + new URLSearchParams(params);
  const res = await fetch(url);
  return res.json();
}

async function apiPost(body) {
  const res = await fetch(API, {
    method: 'POST',
    body: JSON.stringify(body)
  });
  return res.json();
}

async function loadAll() {
  const btn = document.getElementById('sync-btn');
  btn.classList.add('syncing');
  btn.querySelector('svg').style.animation = 'spin .7s linear infinite';
  document.getElementById('sync-status').textContent = '正在同步...';
  try {
    const [eq, br] = await Promise.all([
      apiFetch({ action: 'getEquipment' }),
      apiFetch({ action: 'getBorrows' })
    ]);
    equipment = Array.isArray(eq) ? eq : [];
    borrows = Array.isArray(br) ? br : [];
    updateStats();
    renderTable();
    renderBorrowList();
    renderReturn();
    renderCal();
    const now = new Date().toLocaleTimeString('zh', { hour: '2-digit', minute: '2-digit' });
    document.getElementById('sync-status').textContent = `已同步 · ${now}`;
    showToast('数据已同步');
  } catch (e) {
    document.getElementById('sync-status').textContent = '同步失败，请重试';
    showToast('同步失败，请检查网络');
  }
  btn.classList.remove('syncing');
  btn.querySelector('svg').style.animation = '';
}

// ── Stats ─────────────────────────────────────────
function updateStats() {
  document.getElementById('s-total').textContent = equipment.length;
  document.getElementById('s-in').textContent = equipment.filter(e => e.status === '在库').length;
  document.getElementById('s-out').textContent = equipment.filter(e => e.status === '借出').length;
  document.getElementById('s-repair').textContent = equipment.filter(e => e.status === '维修').length;
}

// ── Table ─────────────────────────────────────────
function renderTable() {
  const q = (document.getElementById('search').value || '').toLowerCase();
  let list = equipment;
  if (currentFilter !== 'all') list = list.filter(e => e.status === currentFilter);
  if (q) list = list.filter(e => (e.name||'').toLowerCase().includes(q) || (e.id||'').toLowerCase().includes(q));

  if (list.length === 0) {
    document.getElementById('table-wrap').innerHTML = `<div class="empty-state"><div class="empty-state-title">没有找到器材</div><div style="font-size:13px">尝试调整筛选条件</div></div>`;
    return;
  }

  const rows = list.map(e => `
    <tr>
      <td>${e.img
        ? `<img class="thumb" src="${e.img}" onclick="openDetail('${e.id}')">`
        : `<div class="thumb-empty" onclick="openDetail('${e.id}')"><svg viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg></div>`}
      </td>
      <td style="font-size:11px;color:#aaa;font-family:monospace">${e.id||''}</td>
      <td><button class="name-link" onclick="openDetail('${e.id}')">${e.name||''}</button><div style="font-size:11px;color:#aaa;margin-top:2px">${e.cat||''}</div></td>
      <td><span class="badge ${e.status==='在库'?'badge-in':e.status==='借出'?'badge-out':'badge-repair'}">${e.status||''}</span></td>
      <td style="font-size:12px;color:#555">${e.borrower||'—'}</td>
      <td style="font-size:12px;color:#888">${e.returnDate||'—'}</td>
      <td style="display:flex;gap:6px">
        <button class="btn btn-sm" onclick="openDetail('${e.id}')">详情</button>
        <button class="btn btn-sm ${e.status!=='借出'?'':'btn-danger'}" onclick="doReturn('${e.id}')" ${e.status!=='借出'?'disabled style="opacity:.3;cursor:default"':''}>归还</button>
      </td>
    </tr>`).join('');

  document.getElementById('table-wrap').innerHTML = `
    <table>
      <thead><tr><th>图片</th><th>编号</th><th>名称</th><th>状态</th><th>借用人</th><th>归还日期</th><th>操作</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  renderTable();
}

// ── Detail Modal ──────────────────────────────────
function openDetail(id) {
  const e = equipment.find(x => x.id === id);
  if (!e) return;
  const sc = e.status === '在库' ? 'badge-in' : e.status === '借出' ? 'badge-out' : 'badge-repair';
  document.getElementById('modal-box').innerHTML = `
    <div class="modal-header">
      <div style="display:flex;align-items:center;gap:10px">
        <span class="modal-title">${e.name}</span>
        <span class="badge ${sc}">${e.status}</span>
      </div>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="img-upload" id="img-area" onclick="triggerUpload('${id}')">
        ${e.img
          ? `<img src="${e.img}"><div class="img-upload-hint">点击更换图片</div>`
          : `<svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
             <span class="img-upload-label">点击上传器材图片</span>
             <span class="img-upload-sub">JPG / PNG</span>`}
      </div>
      <input type="file" id="file-input" accept="image/*" style="display:none" onchange="handleImg('${id}',this)">
      <div class="detail-grid">
        <div class="detail-item"><div class="detail-item-label">编号</div><div class="detail-item-val">${e.id}</div></div>
        <div class="detail-item"><div class="detail-item-label">类别</div><div class="detail-item-val">${e.cat||'—'}</div></div>
        ${e.borrower ? `<div class="detail-item"><div class="detail-item-label">借用人</div><div class="detail-item-val">${e.borrower}</div></div>` : ''}
        ${e.returnDate ? `<div class="detail-item"><div class="detail-item-label">预计归还</div><div class="detail-item-val">${e.returnDate}</div></div>` : ''}
      </div>
      <div class="section-label">器材说明</div>
      <div class="desc-area" id="desc-display">${e.note || '暂无说明'}</div>
      <div style="display:flex;gap:8px;margin-top:12px">
        <button class="btn btn-sm" onclick="editDesc('${id}')">编辑说明</button>
        ${e.status === '借出' ? `<button class="btn btn-sm btn-danger" onclick="doReturn('${id}');closeModal()">确认归还</button>` : ''}
      </div>
    </div>`;
  document.getElementById('modal-bg').classList.add('open');
}

function triggerUpload(id) { document.getElementById('file-input').click(); }

function handleImg(id, input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async function(e) {
    const eq = equipment.find(x => x.id === id);
    if (!eq) return;
    eq.img = e.target.result;
    showToast('正在保存图片...');
    await apiPost({ action: 'updateEquipment', ...eq });
    showToast('图片已保存');
    openDetail(id);
    renderTable();
  };
  reader.readAsDataURL(file);
}

function editDesc(id) {
  const eq = equipment.find(x => x.id === id);
  document.getElementById('desc-display').outerHTML = `
    <textarea id="desc-edit" style="width:100%;min-height:100px;padding:10px;border:1px solid #e5e5e3;border-radius:8px;font-size:13px;font-family:inherit;resize:vertical">${eq.note||''}</textarea>
    <div style="display:flex;gap:8px;margin-top:8px">
      <button class="btn btn-sm btn-primary" onclick="saveDesc('${id}')">保存</button>
      <button class="btn btn-sm" onclick="openDetail('${id}')">取消</button>
    </div>`;
}

async function saveDesc(id) {
  const eq = equipment.find(x => x.id === id);
  eq.note = document.getElementById('desc-edit').value;
  showToast('正在保存...');
  await apiPost({ action: 'updateEquipment', ...eq });
  showToast('说明已保存');
  openDetail(id);
}

// ── Add Modal ─────────────────────────────────────
function openAddModal() {
  document.getElementById('modal-box').innerHTML = `
    <div class="modal-header">
      <span class="modal-title">新增器材</span>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group"><label>编号 *</label><input id="f-id" placeholder="如 YX-001"></div>
        <div class="form-group"><label>名称 *</label><input id="f-name" placeholder="如 无线麦克风"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>类别</label><select id="f-cat"><option>音响设备</option><option>摄影器材</option><option>灯光设备</option><option>帐篷/桌椅</option><option>其他</option></select></div>
        <div class="form-group"><label>状态</label><select id="f-status"><option>在库</option><option>借出</option><option>维修</option></select></div>
      </div>
      <div class="form-group"><label>器材说明</label><textarea id="f-note" placeholder="规格、配件清单、使用注意事项..."></textarea></div>
      <div class="form-actions">
        <button class="btn btn-primary" onclick="addEquipment()">保存到 Google Sheets</button>
        <button class="btn" onclick="closeModal()">取消</button>
      </div>
    </div>`;
  document.getElementById('modal-bg').classList.add('open');
}

async function addEquipment() {
  const id = document.getElementById('f-id').value.trim();
  const name = document.getElementById('f-name').value.trim();
  if (!id || !name) { showToast('请填写编号和名称'); return; }
  const newEq = { id, name, cat: document.getElementById('f-cat').value, status: document.getElementById('f-status').value, borrower: '', returnDate: '', note: document.getElementById('f-note').value, img: '' };
  showToast('正在保存...');
  await apiPost({ action: 'saveEquipment', ...newEq });
  equipment.push(newEq);
  updateStats(); renderTable();
  closeModal();
  showToast('器材已添加');
}

// ── Return ────────────────────────────────────────
async function doReturn(id) {
  if (!confirm('确认归还该器材？')) return;
  const eq = equipment.find(e => e.id === id);
  if (!eq) return;
  eq.status = '在库'; eq.borrower = ''; eq.returnDate = '';
  const b = borrows.find(b => (b.items||[]).includes(id) && b.status === '借出中');
  if (b) b.status = '已归还';
  showToast('正在更新...');
  await apiPost({ action: 'updateBorrowStatus', id });
  updateStats(); renderTable(); renderBorrowList(); renderReturn();
  showToast('归还成功，Google Sheets 已更新');
}

// ── Borrow ────────────────────────────────────────
function renderChecklist() {
  const avail = equipment.filter(e => e.status === '在库');
  document.getElementById('eq-checklist').innerHTML = avail.length === 0
    ? '<div style="font-size:12px;color:#aaa">暂无在库器材</div>'
    : avail.map(e => `
      <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;padding:4px 0">
        <input type="checkbox" value="${e.id}" style="width:auto">
        <span style="font-family:monospace;font-size:11px;color:#aaa">${e.id}</span> ${e.name}
      </label>`).join('');
}

async function submitBorrow() {
  const name = document.getElementById('b-name').value.trim();
  const contact = document.getElementById('b-contact').value.trim();
  const outDate = document.getElementById('b-out').value;
  const returnDate = document.getElementById('b-return').value;
  const items = [...document.querySelectorAll('#eq-checklist input:checked')].map(c => c.value);
  if (!name || !outDate || !returnDate || items.length === 0) { showToast('请填写完整信息并选择器材'); return; }
  const record = { borrower: name, contact, items, outDate, returnDate, note: document.getElementById('b-note').value, status: '借出中' };
  showToast('正在提交...');
  await apiPost({ action: 'saveBorrow', ...record });
  borrows.unshift(record);
  items.forEach(id => {
    const eq = equipment.find(e => e.id === id);
    if (eq) { eq.status = '借出'; eq.borrower = name; eq.returnDate = returnDate; }
  });
  ['b-name','b-contact','b-out','b-return','b-note'].forEach(i => document.getElementById(i).value = '');
  updateStats(); renderChecklist(); renderBorrowList(); renderTable();
  showToast('申请已提交，Google Sheets 已更新');
}

function renderBorrowList() {
  const el = document.getElementById('borrow-list');
  if (!el) return;
  if (borrows.length === 0) { el.innerHTML = '<div class="empty-state"><div class="empty-state-title">暂无借用记录</div></div>'; return; }
  el.innerHTML = borrows.map(b => `
    <div class="borrow-card">
      <div class="borrow-card-header">
        <span class="borrow-name">${b.borrower}</span>
        <span class="badge ${b.status==='借出中'?'badge-out':b.status==='已归还'?'badge-returned':'badge-in'}">${b.status}</span>
      </div>
      <div class="borrow-meta">${b.outDate} → ${b.returnDate} &nbsp;·&nbsp; ${b.contact||''}</div>
      <div class="borrow-items">${(b.items||[]).join(', ')}${b.note?' · '+b.note:''}</div>
    </div>`).join('');
}

// ── Return list ───────────────────────────────────
function renderReturn() {
  const el = document.getElementById('return-list');
  if (!el) return;
  const today = new Date().toISOString().slice(0,10);
  const pending = borrows.filter(b => b.status === '借出中');
  if (pending.length === 0) { el.innerHTML = '<div class="empty-state"><div class="empty-state-title">暂无待归还器材</div></div>'; return; }
  el.innerHTML = pending.map(b => {
    const late = b.returnDate < today;
    return `<div class="return-card ${late?'overdue':''}">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
        <span style="font-weight:600">${b.borrower}</span>
        ${late ? '<span class="badge badge-repair">已逾期</span>' : '<span class="badge badge-out">借出中</span>'}
      </div>
      <div style="font-size:12px;color:#888;margin-bottom:8px">预计归还：${b.returnDate}${late?' （逾期 '+Math.floor((new Date()-new Date(b.returnDate))/86400000)+' 天）':''}</div>
      <div style="font-size:12px;color:#555;margin-bottom:10px">${(b.items||[]).join(', ')}</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        ${(b.items||[]).map(id => `<button class="btn btn-sm btn-danger" onclick="doReturn('${id}')">归还 ${id}</button>`).join('')}
      </div>
    </div>`;
  }).join('');
}

// ── Calendar ──────────────────────────────────────
function renderCal() {
  const months = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
  document.getElementById('cal-title').textContent = `${calYear}年 ${months[calMonth]}`;
  document.getElementById('cal-names').innerHTML = ['日','一','二','三','四','五','六'].map(d => `<div class="cal-day-name">${d}</div>`).join('');
  const first = new Date(calYear, calMonth, 1).getDay();
  const total = new Date(calYear, calMonth+1, 0).getDate();
  const today = new Date();
  let html = '';
  for (let i = 0; i < first; i++) html += '<div class="cal-day empty"></div>';
  for (let d = 1; d <= total; d++) {
    const ds = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = today.getFullYear()===calYear && today.getMonth()===calMonth && today.getDate()===d;
    const dayBorrows = borrows.filter(b => b.status==='借出中' && b.outDate<=ds && b.returnDate>=ds);
    html += `<div class="cal-day ${isToday?'today':''} ${dayBorrows.length>0&&!isToday?'has-booking':''}" onclick="showCalDay('${ds}')">
      <div class="cal-day-num ${isToday?'cal-today-num':''}">${d}</div>
      ${dayBorrows.slice(0,2).map(b=>`<div class="cal-dot">${(b.items||[]).join(',')}</div>`).join('')}
      ${dayBorrows.length>2?`<div class="cal-dot">+${dayBorrows.length-2}项</div>`:''}
    </div>`;
  }
  document.getElementById('cal-body').innerHTML = html;
  document.getElementById('cal-detail').innerHTML = '';
}

function showCalDay(date) {
  const active = borrows.filter(b => b.status==='借出中' && b.outDate<=date && b.returnDate>=date);
  const det = document.getElementById('cal-detail');
  if (active.length === 0) { det.innerHTML = ''; return; }
  det.innerHTML = `<div style="font-weight:600;font-size:14px;margin-bottom:10px;padding-top:16px;border-top:1px solid #e5e5e3">${date} 借出中的器材</div>` +
    active.map(b => `<div class="borrow-card">
      <div style="font-weight:600">${b.borrower}</div>
      <div style="font-size:12px;color:#888;margin-top:2px">${(b.items||[]).join(', ')}${b.note?' · '+b.note:''}</div>
    </div>`).join('');
}

function changeMonth(d) {
  calMonth += d;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  if (calMonth < 0) { calMonth = 11; calYear--; }
  renderCal();
}

// ── UI helpers ────────────────────────────────────
function showSection(id, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
  if (id === 'borrow') { renderChecklist(); renderBorrowList(); }
  if (id === 'calendar') renderCal();
  if (id === 'return') renderReturn();
}

function closeModal() { document.getElementById('modal-bg').classList.remove('open'); }
function handleBgClick(e) { if (e.target === document.getElementById('modal-bg')) closeModal(); }

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

// ── Init ──────────────────────────────────────────
loadAll();
</script>
</body>
</html>
